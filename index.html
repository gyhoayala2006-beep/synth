<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sintetizador Ecuasynth by Assayk</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="css/main.css">
    
    <script src="js/main.js" type="module" defer></script>
</head>
<body>

    <div class="container my-4">
        <div class="synth-master-panel p-4">
            
            <header class="row align-items-center mb-4 pb-3 border-bottom border-secondary border-opacity-25">
                <div class="col-md-6 text-center text-md-start">
                    <h1 class="synth-title m-0">ECUASYNTH BY ASSAYK</h1>
                </div>
                <div class="col-md-6 mt-3 mt-md-0">
                    <div class="octave-selector-box p-3 rounded">
                        <label for="octaveSlider" class="form-label text-purple fw-bold d-flex justify-content-between">
                            <span>OCTAVAS</span>
                            <span id="octaveDisplay" class="badge bg-purple">3 Octavas</span>
                        </label>
                        <input type="range" class="form-range custom-slider" id="octaveSlider" min="1" max="5" value="3" step="1">
                    </div>
                </div>
            </header>

            <div class="row g-3 mb-4">
                <div class="col-xl-3 col-md-6">
                    <div class="osc-section p-3 rounded h-100 active" id="section-A">
                        <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom border-dark">
                            <h2 class="h6 text-purple-light m-0">OSCILADOR A</h2>
                            <div class="form-check form-switch custom-switch">
                                <input class="form-check-input" type="checkbox" id="btnToggleA" checked>
                            </div>
                        </div>
                        <div class="mb-2">
                            <select id="waveTypeA" class="form-select form-select-sm custom-select">
                                <option value="sine">Senoidal</option>
                                <option value="triangle">Triangular</option>
                                <option value="sawtooth" selected>Diente de Sierra</option>
                                <option value="square">Cuadrada</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label text-muted-purple micro-label d-flex justify-content-between">
                                <span>VOCES</span> <span id="detuneDisplayA">0c</span>
                            </label>
                            <input type="range" class="form-range custom-slider" id="detuneSliderA" min="-50" max="50" value="0" step="1">
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="osc-section p-3 rounded h-100" id="section-B">
                        <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom border-dark">
                            <h2 class="h6 text-purple-light m-0">OSCILADOR B</h2>
                            <div class="form-check form-switch custom-switch">
                                <input class="form-check-input" type="checkbox" id="btnToggleB">
                            </div>
                        </div>
                        <div class="mb-2">
                            <select id="waveTypeB" class="form-select form-select-sm custom-select">
                                <option value="sine" selected>Senoidal</option>
                                <option value="triangle">Triangular</option>
                                <option value="sawtooth">Diente de Sierra</option>
                                <option value="square">Cuadrada</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label text-muted-purple micro-label d-flex justify-content-between">
                                <span>VOCES</span> <span id="detuneDisplayB">+7c</span>
                            </label>
                            <input type="range" class="form-range custom-slider" id="detuneSliderB" min="-50" max="50" value="7" step="1">
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="osc-section p-3 rounded h-100" id="section-C">
                        <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom border-dark">
                            <h2 class="h6 text-purple-light m-0">OSCILADOR C</h2>
                            <div class="form-check form-switch custom-switch">
                                <input class="form-check-input" type="checkbox" id="btnToggleC">
                            </div>
                        </div>
                        <div class="mb-2">
                            <select id="waveTypeC" class="form-select form-select-sm custom-select">
                                <option value="sine">Senoidal</option>
                                <option value="triangle">Triangular</option>
                                <option value="sawtooth">Diente de Sierra</option>
                                <option value="square" selected>Cuadrada</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label text-muted-purple micro-label d-flex justify-content-between">
                                <span>VOCES</span> <span id="detuneDisplayC">-5c</span>
                            </label>
                            <input type="range" class="form-range custom-slider" id="detuneSliderC" min="-50" max="50" value="-5" step="1">
                        </div>
                    </div>
                </div>

                <div class="col-xl-3 col-md-6">
                    <div class="osc-section p-3 rounded h-100" id="section-Noise">
                        <div class="d-flex justify-content-between align-items-center mb-2 pb-2 border-bottom border-dark">
                            <h2 class="h6 text-purple-light m-0">GENERADOR DE RUIDO</h2>
                            <div class="form-check form-switch custom-switch">
                                <input class="form-check-input" type="checkbox" id="btnToggleNoise">
                            </div>
                        </div>
                        <div class="mb-2">
                            <select id="noiseType" class="form-select form-select-sm custom-select">
                                <option value="white">Ruido Blanco</option>
                                <option value="pink">Ruido Rosa</option>
                            </select>
                        </div>
                        <div>
                            <label class="form-label text-muted-purple micro-label d-flex justify-content-between">
                                <span>VOLUMEN RUIDO</span> <span id="noiseVolDisplay">50%</span>
                            </label>
                            <input type="range" class="form-range custom-slider" id="noiseVolume" min="0" max="1" value="0.5" step="0.01">
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-12">
                    <div class="modules-wrapper p-3 rounded">
                        <h3 class="h6 text-purple fw-bold mb-3 text-uppercase letter-spacing-1">Filtros de Audio</h3>
                        <div class="row g-3">
                            <div class="col-md-4">
                                <div class="filter-card p-3 rounded text-center">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="micro-label text-purple-light">FILTROS OSC A</span>
                                        <button type="button" class="btn btn-xs filter-toggle active" id="pwrFiltroA">ON</button>
                                    </div>
                                    <div class="btn-group w-100" role="group">
                                        <button type="button" class="btn btn-sm btn-filter active" id="fltA-lp">Bajos</button>
                                        <button type="button" class="btn btn-sm btn-filter" id="fltA-hp">Altos</button>
                                        <button type="button" class="btn btn-sm btn-filter" id="fltA-bp">Medios</button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-card p-3 rounded text-center">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="micro-label text-purple-light">FILTROS OSC B</span>
                                        <button type="button" class="btn btn-xs filter-toggle active" id="pwrFiltroB">ON</button>
                                    </div>
                                    <div class="btn-group w-100" role="group">
                                        <button type="button" class="btn btn-sm btn-filter active" id="fltB-lp">Bajos</button>
                                        <button type="button" class="btn btn-sm btn-filter" id="fltB-hp">Altos</button>
                                        <button type="button" class="btn btn-sm btn-filter" id="fltB-bp">Medios</button>
                                    </div>
                                </div>
                            </div>
                            <div class="col-md-4">
                                <div class="filter-card p-3 rounded text-center">
                                    <div class="d-flex justify-content-between align-items-center mb-2">
                                        <span class="micro-label text-purple-light">FILTROS OSC C</span>
                                        <button type="button" class="btn btn-xs filter-toggle active" id="pwrFiltroC">ON</button>
                                    </div>
                                    <div class="btn-group w-100" role="group">
                                        <button type="button" class="btn btn-sm btn-filter active" id="fltC-lp">Bajos</button>
                                        <button type="button" class="btn btn-sm btn-filter" id="fltC-hp">Altos</button>
                                        <button type="button" class="btn btn-sm btn-filter" id="fltC-bp">Medios</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="row g-3 mb-4">
                <div class="col-12">
                    <div class="modules-wrapper p-3 rounded">
                        <h3 class="h6 text-purple fw-bold mb-3 text-uppercase letter-spacing-1">Amplificador de Amplitud Temporal</h3>
                        <div class="row align-items-center">
                            <div class="col-md-4 text-center">
                                <canvas id="adsrCanvas" width="260" height="120" class="rounded border border-secondary border-opacity-25 bg-black-synth"></canvas>
                            </div>
                            <div class="col-md-8">
                                <div class="row g-3 text-center">
                                    <div class="col-3">
                                        <label for="adsrAttack" class="micro-label d-block text-muted-purple mb-1">ATAQUE</label>
                                        <input type="range" class="form-range knob-slider" id="adsrAttack" min="0" max="2" value="0.1" step="0.01">
                                        <span id="displayAttack" class="small-val">0.10s</span>
                                    </div>
                                    <div class="col-3">
                                        <label for="adsrDecay" class="micro-label d-block text-muted-purple mb-1">DECAY</label>
                                        <input type="range" class="form-range knob-slider" id="adsrDecay" min="0.01" max="2" value="0.2" step="0.01">
                                        <span id="displayDecay" class="small-val">0.20s</span>
                                    </div>
                                    <div class="col-3">
                                        <label for="adsrSustain" class="micro-label d-block text-muted-purple mb-1">SUSTAIN</label>
                                        <input type="range" class="form-range knob-slider" id="adsrSustain" min="0" max="1" value="0.7" step="0.01">
                                        <span id="displaySustain" class="small-val">70%</span>
                                    </div>
                                    <div class="col-3">
                                        <label for="adsrRelease" class="micro-label d-block text-muted-purple mb-1">RELEASE</label>
                                        <input type="range" class="form-range knob-slider" id="adsrRelease" min="0.01" max="3" value="0.4" step="0.01">
                                        <span id="displayRelease" class="small-val">0.40s</span>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="piano-wrapper p-3 rounded">
                <div id="pianoContainer" class="piano-keys d-flex justify-content-center"></div>
            </div>

        </div>
    </div>

</body>
</html>
